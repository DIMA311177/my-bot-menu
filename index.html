<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #ffffff;
            --tg-theme-text-color: #000000;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0; padding-bottom: 70px;
        }
        /* Стили панелей */
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        
        /* Нижняя навигация */
        .navbar {
            position: fixed; bottom: 0; width: 100%;
            background: var(--tg-theme-secondary-bg-color, #f4f4f4);
            display: flex; justify-content: space-around;
            padding: 10px 0; border-top: 1px solid #ccc;
        }
        .nav-item {
            cursor: pointer; text-align: center; font-size: 12px;
            color: var(--tg-theme-hint-color, #999);
        }
        .nav-item.active { color: var(--tg-theme-button-color, #2481cc); font-weight: bold; }
        
        .card {
            background: var(--tg-theme-secondary-bg-color);
            padding: 15px; border-radius: 12px; margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <!-- Раздел Главная -->
    <div id="home" class="page active">
        <h1>Главная</h1>
        <div class="card">
            <h3>Добро пожаловать!</h3>
            <p>Это ваш личный кабинет управления ботом.</p>
        </div>
    </div>

    <!-- Раздел Сервисы -->
    <div id="services" class="page">
        <h1>Сервисы</h1>
        <div class="card">
            <h3>Игровые сервера</h3>
            <p>Статус: Онлайн ✅</p>
        </div>
        <div class="card">
            <h3>Разработка</h3>
            <p>Скрипты на заказ любой сложности.</p>
        </div>
    </div>

    <!-- Раздел Профиль -->
    <div id="profile" class="page">
        <h1>Профиль</h1>
        <div class="card" id="user-info">
            <!-- Сюда вставим имя пользователя -->
        </div>
    </div>

    <!-- Нижнее меню -->
    <div class="navbar">
        <div class="nav-item active" onclick="showPage('home', this)">🏠 Главная</div>
        <div class="nav-item" onclick="showPage('services', this)">🛠 Сервисы</div>
        <div class="nav-item" onclick="showPage('profile', this)">👤 Профиль</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Показ страниц
        function showPage(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            element.classList.add('active');
        }

        // Показ имени юзера
        document.getElementById('user-info').innerText = "Привет, " + (tg.initDataUnsafe.user ? tg.initDataUnsafe.user.first_name : "Гость");
    </script>
</body>
</html>
